<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>your inbox — dedic.to</title>
<link rel="icon" href="tab-title.png" type="image/png">
  <meta name="theme-color" content="#7C4DFF">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --purple:       #7C4DFF;
      --purple-deep:  #5B2FE8;
      --purple-light: #C4ACFF;
      --neon:         #BEFF29;
      --blue:         #5B8FE8;
      --text-primary: #0D0A18;
      --text-sec:     #6B6080;
      --text-muted:   #A89EC0;
      --font:         'Plus Jakarta Sans', sans-serif;
      --r-pill:       50px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; }
    body {
      font-family: var(--font);
      background: #FFFFFF;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
    }

    body.dark {
      --text-primary: #F5F0FF;
      --text-sec:     #9B90BE;
      --text-muted:   #6B6080;
      background: #080612;
      color: var(--text-primary);
    }

    /* ── Glow animation ────────────────────────────────────────────────────── */
    @keyframes glow-cycle {
      0%   { box-shadow: 0 0 0 1.5px #7C4DFF, 0 0 16px 1px rgba(124,77,255,.50); }
      17%  { box-shadow: 0 0 0 1.5px #5B8FE8, 0 0 16px 1px rgba(91,143,232,.50); }
      33%  { box-shadow: 0 0 0 1.5px #BEFF29, 0 0 16px 1px rgba(190,255,41,.40); }
      50%  { box-shadow: 0 0 0 1.5px #FF5BAD, 0 0 16px 1px rgba(255,91,173,.50); }
      67%  { box-shadow: 0 0 0 1.5px #FF8C5A, 0 0 16px 1px rgba(255,140,90,.50); }
      83%  { box-shadow: 0 0 0 1.5px #00C8A0, 0 0 16px 1px rgba(0,200,160,.50); }
      100% { box-shadow: 0 0 0 1.5px #7C4DFF, 0 0 16px 1px rgba(124,77,255,.50); }
    }

    /* ── Loading dots animation ────────────────────────────────────────────── */
    @keyframes ld-pulse {
      0%, 80%, 100% { transform: scale(.55); opacity: .4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── Background canvas ─────────────────────────────────────────────────── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Loading view ──────────────────────────────────────────────────────── */
    #view-loading {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      transition: background .3s;
    }
    body.dark #view-loading { background: #080612; }

    .ld-wrap { display: flex; gap: 10px; align-items: center; }
    .ld {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--purple);
      animation: ld-pulse 1.2s ease-in-out infinite;
    }
    .ld:nth-child(2) { animation-delay: .18s; }
    .ld:nth-child(3) { animation-delay: .36s; }

    /* ── Dark mode toggle ──────────────────────────────────────────────────── */
    #theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 400;
      width: 56px; height: 30px; background: none; border: none; padding: 0;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .tt-track {
      width: 56px; height: 30px; border-radius: 15px;
      background: rgba(210,195,245,.32); border: 1.5px solid rgba(180,160,225,.44);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      position: relative; transition: background .4s, border-color .4s, box-shadow .4s;
    }
    body.dark .tt-track {
      background: rgba(13,10,26,.72); border-color: rgba(190,255,41,.38);
      box-shadow: 0 0 14px rgba(190,255,41,.22), inset 0 0 10px rgba(124,77,255,.14);
    }
    .tt-thumb {
      position: absolute; top: 4px; left: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.18);
      display: flex; align-items: center; justify-content: center; color: #7C4DFF;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .35s, box-shadow .35s, color .35s;
    }
    body.dark .tt-thumb {
      transform: translateX(26px); background: #BEFF29; color: #0D0A18;
      box-shadow: 0 0 12px rgba(190,255,41,.6), 0 2px 6px rgba(0,0,0,.2);
    }
    .tt-thumb svg { width: 11px; height: 11px; flex-shrink: 0; }
    .tt-moon { display: none; } .tt-sun { display: block; }
    body.dark .tt-moon { display: block; } body.dark .tt-sun { display: none; }
    @keyframes tt-click { 0%,100%{transform:scale(1)} 45%{transform:scale(.92)} }
    #theme-toggle:active .tt-track { animation: tt-click .18s ease; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(124,77,255,.92);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: var(--r-pill);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 200;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Page wrap ─────────────────────────────────────────────────────────── */
    .page-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 80px;
      min-height: 100vh;
    }
    .create-nudge { display: block; text-align: center; font-size: 13px; font-weight: 600; color: var(--purple); text-decoration: none; margin-top: 32px; padding: 9px 20px; background: rgba(124,77,255,0.08); border: 1.5px solid rgba(124,77,255,0.22); border-radius: 24px; transition: background .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
    .create-nudge:hover, .create-nudge:active { background: rgba(124,77,255,0.15); border-color: rgba(124,77,255,0.42); }
    body.dark .create-nudge { color: var(--neon); background: rgba(190,255,41,0.07); border-color: rgba(190,255,41,0.22); }
    body.dark .create-nudge:hover, body.dark .create-nudge:active { background: rgba(190,255,41,0.14); border-color: rgba(190,255,41,0.42); }

    /* ── Site logo ─────────────────────────────────────────────────────────── */
    .site-logo {
      width: 110px;
      margin-bottom: 28px;
      display: block;
      object-fit: contain;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .inbox-header {
      width: 100%;
      max-width: 440px;
      margin-bottom: 24px;
    }
    .inbox-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--text-primary) 40%, #7C4DFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    body.dark .inbox-name {
      background: linear-gradient(135deg, #F5F0FF 40%, #C4ACFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .inbox-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .inbox-action-btn {
      padding: 8px 16px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid rgba(180,160,225,.42);
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-primary);
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .inbox-action-btn:hover { background: rgba(237,230,255,.70); border-color: rgba(124,77,255,.30); }
    .inbox-action-btn.danger { color: #FF5BAD; border-color: rgba(255,91,173,.30); }
    .inbox-action-btn.danger:hover { background: rgba(255,91,173,.08); }
    .inbox-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
    }
    body.dark .inbox-action-btn {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.25);
      color: var(--text-primary);
    }
    body.dark .inbox-action-btn:hover {
      background: rgba(40,28,80,.75);
    }
    body.dark .inbox-action-btn.danger {
      color: #FF5BAD;
      border-color: rgba(255,91,173,.30);
    }

    /* ── Dedications list ──────────────────────────────────────────────────── */
    .ded-list {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .invite-footer {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid rgba(180,160,225,.14);
    }
    .invite-footer-text {
      font-size: 12px; color: var(--text-muted); text-align: center;
    }
    body.dark .invite-footer { border-top-color: rgba(196,172,255,.10); }

    /* ── Dedication card ───────────────────────────────────────────────────── */
    .ded-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(180,160,225,.38);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: filter .15s;
    }
    .ded-card:hover { filter: brightness(1.04); }
    .ded-card-top { display: flex; align-items: center; gap: 12px; }
    .ded-art {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(196,172,255,.3);
    }
    .ded-info { flex: 1; min-width: 0; }
    .ded-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ded-artist {
      font-size: 12px;
      color: var(--text-sec);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .ded-anon-pill {
      display: inline-block;
      background: #BEFF29;
      color: #0D0A18;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 50px;
      letter-spacing: .03em;
      align-self: flex-start;
    }
    .ded-message {
      font-size: 13px;
      color: var(--text-sec);
      font-style: italic;
      line-height: 1.5;
    }
    .ded-date { font-size: 11px; color: var(--text-muted); }
    .ded-actions { display: flex; gap: 10px; }
    .ded-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: var(--r-pill);
      border: 1.5px solid rgba(180,160,225,.38);
      background: rgba(255,255,255,.55);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .ded-btn:hover { background: rgba(237,230,255,.70); border-color: rgba(124,77,255,.35); }
    .ded-btn.playing { background: rgba(124,77,255,.12); border-color: rgba(124,77,255,.45); color: var(--purple); }
    .ded-btn:disabled { opacity: .45; cursor: default; }

    body.dark .ded-card {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.18);
    }
    body.dark .ded-btn {
      background: rgba(30,20,55,.70);
      border-color: rgba(180,160,225,.22);
      color: var(--text-primary);
    }
    body.dark .ded-btn:hover {
      background: rgba(60,40,110,.75);
      border-color: rgba(124,77,255,.40);
    }
    body.dark .ded-btn.playing {
      background: rgba(124,77,255,.20);
      border-color: rgba(124,77,255,.55);
      color: #C4ACFF;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    .empty-wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    .empty-card {
      width: 100%;
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(180,160,225,.38);
      border-radius: 24px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    body.dark .empty-card {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.18);
    }
    .empty-title-img {
      width: 160px;
      margin-bottom: 4px;
    }
    .empty-display-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--purple-light);
    }
    .empty-heading {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .empty-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Invite card preview ───────────────────────────────────────────────── */
    .invite-preview-wrap {
      position: relative;
      width: 270px;
      height: 480px;
      border-radius: 24px;
      overflow: hidden;
      background: #0D0A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 16px;
      flex-shrink: 0;
      animation: glow-cycle 5s linear infinite;
    }
    #preview-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .invite-preview-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    .invite-preview-title {
      width: 130px;
      margin-bottom: 8px;
    }
    .invite-preview-name {
      font-size: 13px;
      font-weight: 500;
      color: #C4ACFF;
      margin-bottom: 6px;
    }
    .invite-preview-tag {
      font-size: 11px;
      font-weight: 700;
      color: #F5F0FF;
      text-align: center;
      line-height: 1.45;
    }
    .invite-preview-url {
      font-size: 9px;
      color: rgba(190,255,41,.80);
      margin-top: 4px;
      word-break: break-all;
      text-align: center;
      line-height: 1.4;
      max-width: 220px;
    }
    .invite-preview-url--pill {
      margin-top: auto;
      margin-bottom: 4px;
      padding: 7px 14px;
      background: rgba(190,255,41,0.07);
      border: 1px solid rgba(190,255,41,0.45);
      border-radius: 50px;
      box-shadow: 0 0 14px rgba(190,255,41,0.18);
      font-size: 9px;
      font-weight: 700;
      color: #BEFF29;
      letter-spacing: 0.03em;
      text-align: center;
      max-width: 200px;
      word-break: break-all;
    }
    .invite-preview-watermark {
      font-size: 9px;
      color: rgba(122,111,168,.55);
      margin-top: 5px;
      font-weight: 600;
    }

    /* ── Share invite button ───────────────────────────────────────────────── */
    .share-invite-btn {
      padding: 12px 28px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid rgba(124,77,255,.45);
      background: rgba(124,77,255,.10);
      color: var(--purple);
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .share-invite-btn:hover {
      background: rgba(124,77,255,.20);
      border-color: rgba(124,77,255,.60);
    }
    .share-invite-btn:disabled {
      opacity: .55;
      cursor: default;
    }
    body.dark .share-invite-btn {
      background: rgba(124,77,255,.18);
      border-color: rgba(196,172,255,.35);
      color: #C4ACFF;
    }
    body.dark .share-invite-btn:hover {
      background: rgba(124,77,255,.30);
    }

    /* ═══ COFFEE FLOAT ═════════════════════════════════════════ */
    .coffee-float { position:fixed; bottom:24px; right:20px; z-index:500; cursor:pointer; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; overflow:visible; }
    .coffee-float svg { width:40px; height:40px; animation:cfGlow 3s ease-in-out infinite; transition:filter .3s; }
    .coffee-float:hover svg { filter:drop-shadow(0 0 14px rgba(255,255,255,.7)); animation:none; }
    .coffee-float:active svg { transform:scale(.92); animation:none; }
    @keyframes cfGlow{0%,100%{filter:drop-shadow(0 2px 10px rgba(255,255,255,.22)) drop-shadow(0 0 5px rgba(255,245,225,.15))}50%{filter:drop-shadow(0 2px 18px rgba(255,255,255,.48)) drop-shadow(0 0 10px rgba(255,245,225,.30))}}
    .cf-tip { font-size:11px; font-weight:700; font-family:var(--font); color:var(--text-sec); white-space:nowrap; background:rgba(255,255,255,.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(180,160,225,.30); border-radius:20px; padding:5px 11px; margin-right:8px; opacity:0; transform:translateX(6px); transition:opacity .2s,transform .2s; pointer-events:none; }
    body.dark .cf-tip { background:rgba(18,10,38,.90); color:#B0A0D8; border-color:rgba(124,77,255,.25); }
    .coffee-float:hover .cf-tip { opacity:1; transform:translateX(0); }
    /* ═══ SPLASH ══════════════════════════════════════════════════ */
    #splash { position:fixed; inset:0; z-index:9999; background:#0D0A18; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:opacity .38s cubic-bezier(.4,0,1,1); }
    #splash.hide { opacity:0; pointer-events:none; }
    #splash.gone { display:none; }
    #splash-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
    #splash-logo { position:relative; z-index:1; width:clamp(200px,55vw,380px); height:auto; opacity:0; filter:drop-shadow(0 0 28px rgba(124,77,255,.55)); }

    /* ── PLATFORM SHARE PANEL ─────────────────────────────────── */
    .psh-scrim { position:fixed; inset:0; z-index:600; background:rgba(0,0,0,0); pointer-events:none; transition:background .3s; }
    .psh-scrim.show { background:rgba(0,0,0,.45); pointer-events:all; }
    .psh-panel { position:fixed; bottom:0; left:0; right:0; z-index:601; background:rgba(255,255,255,.96); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-radius:24px 24px 0 0; padding:0 18px max(env(safe-area-inset-bottom,0px),20px); transform:translateY(100%); transition:transform .38s cubic-bezier(.32,1,.32,1); max-width:480px; margin:0 auto; box-shadow:0 -4px 32px rgba(0,0,0,.10); border-top:1.5px solid rgba(180,160,225,.18); }
    .psh-panel.show { transform:translateY(0); }
    .psh-handle { width:36px; height:4px; border-radius:2px; background:rgba(0,0,0,.12); margin:14px auto 20px; }
    .psh-title { font-size:17px; font-weight:800; color:var(--text-primary,#0D0A18); text-align:center; letter-spacing:-.02em; margin-bottom:4px; }
    .psh-sub { font-size:12px; color:var(--text-muted,#A89EC0); text-align:center; margin-bottom:22px; }
    .psh-platforms { display:flex; gap:10px; margin-bottom:18px; }
    .psh-plat { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; padding:15px 6px 13px; border-radius:18px; border:1.5px solid rgba(180,160,225,.22); background:rgba(124,77,255,.04); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .18s, border-color .18s, transform .12s; font-family:var(--font); }
    .psh-plat:active { transform:scale(.93); }
    .psh-plat-icon { width:50px; height:50px; border-radius:14px; flex-shrink:0; object-fit:cover; }
    .psh-plat-name { font-size:12px; font-weight:700; color:var(--text-primary,#0D0A18); letter-spacing:-.01em; }
    .psh-plat-badge { font-size:10px; font-weight:600; color:rgba(124,77,255,.75); }
    .psh-plat-badge--dim { color:var(--text-muted,#A89EC0); opacity:.7; }
    .psh-divider { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .psh-divider::before,.psh-divider::after { content:''; flex:1; height:1px; background:rgba(0,0,0,.08); }
    .psh-divider span { font-size:11px; color:var(--text-muted,#A89EC0); letter-spacing:.06em; text-transform:uppercase; }
    .psh-utils { display:flex; gap:10px; margin-bottom:10px; }

const bgCanvas=document.getElementById('bg');

const ωM=(Math.PI*2)/30000,ωM2=ωM*0.77,ωA=ωM*0.625,ωA2=ωM*0.484;

  const dark=document.body.classList.contains('dark');

  bgCtx.fillStyle=gA;bgCtx.fillRect(0,0,BW,BH);

function drawGrid(){
  bgCtx.save();bgCtx.strokeStyle='rgba(155,125,210,.050)';bgCtx.lineWidth=1;
  for(let x=.5;x<BW;x+=CELL){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,BH);bgCtx.stroke();}

const PX=28,GAP=3,CELL=PX+GAP;
const PAL=[[124,77,255,.20],[91,143,232,.16],[196,172,255,.18],[68,136,255,.13],[190,255,41,.09],[255,91,173,.08],[168,196,255,.10],[255,140,90,.04],[80,200,200,.02]];
const CW_acc=[];let _palSum=0;
for(const c of PAL){_palSum+=c[3];CW_acc.push(_palSum);}
function pickCol(){const r=Math.random()*_palSum;for(let i=0;i<CW_acc.length;i++)if(r<=CW_acc[i])return PAL[i];return PAL[0];}
let pixels=[],BW=0,BH=0;
function bgDens(col,row,cols,rows){
  const nx=col/Math.max(cols-1,1),ny=row/Math.max(rows-1,1);
  const rx=.42*(BH/BW),ry=.40;const dx=(nx-.50)/rx,dy=(ny-.47)/ry;
  const ring=Math.exp(-(Math.abs(Math.sqrt(dx*dx+dy*dy)-1)**2)/(2*.09*.09));
  const mc=Math.min(Math.hypot(nx,ny),Math.hypot(1-nx,ny),Math.hypot(nx,1-ny),Math.hypot(1-nx,1-ny));
  return Math.max(ring*.88,Math.max(0,1-mc/.26)*.94);
}
function buildPx(){
  BW=bgCanvas.width=window.innerWidth;BH=bgCanvas.height=window.innerHeight;
  const cols=Math.ceil(BW/CELL)+1,rows=Math.ceil(BH/CELL)+1;pixels=[];
  const now=performance.now();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const d=bgDens(c,r,cols,rows);if(d<.01||Math.random()>d*.80)continue;
    const col=pickCol();
    pixels.push({ox:c*CELL,oy:r*CELL,x:c*CELL,y:r*CELL,vx:0,vy:0,r:col[0],g:col[1],b:col[2],minOp:.04,maxOp:Math.min(.28+d*.54,.88),period:552+Math.random()*2010,phase:Math.random()*Math.PI*2,t0:now-Math.random()*(552+Math.random()*2010)});

const SPRING_K=0.06,DAMPING=0.80,REP_R=110,REP_F=7;
function applySpring(item){
  const ddx=curX-item.x,ddy=curY-item.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);
  let fx=0,fy=0;
  if(dist<REP_R&&dist>0){const str=(1-dist/REP_R)*REP_F;fx=-(ddx/dist)*str;fy=-(ddy/dist)*str;}
  item.vx=(item.vx+(item.ox-item.x)*SPRING_K+fx)*DAMPING;
  item.vy=(item.vy+(item.oy-item.y)*SPRING_K+fy)*DAMPING;
  item.x+=item.vx;item.y+=item.vy;
}

}

/* ═══════════════════════════════════════════════════════════════════════════

const audio=new Audio();let previewTimer=null,activePlayBtn=null;

  clearTimeout(previewTimer);

    activePlayBtn.classList.remove('playing');

  }

function togglePlay(btn,url,startSec,dur){

function formatDate(iso){
  const d=new Date(iso);const now=new Date();
  const diff=Math.floor((now-d)/86400000);
  if(diff===0)return 'today';
  if(diff===1)return 'yesterday';
  if(diff<7)return `${diff} days ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');

async function generateDedicationVideo(ded) {
  const RW=1080,RH=1920;
  const recCvs=document.createElement('canvas'); recCvs.width=RW; recCvs.height=RH;

      const audioEl2=new Audio(); audioEl2.crossOrigin='anonymous'; audioEl2.src=ded.preview_url;
      const src2=audioCtx2.createMediaElementSource(audioEl2);
      streamDest2=audioCtx2.createMediaStreamDestination();
      src2.connect(audioCtx2.destination); src2.connect(streamDest2);
      audioCtx2.resume().catch(()=>{});
      audioEl2.currentTime=ded.clip_start||0;
      audioEl2.play().catch(()=>{});
      setTimeout(()=>audioEl2.pause(),clipDur*1000);
    }catch(e){streamDest2=null;}
  }
  function renderDedFrame(now){
    const elapsed=(now-recStart)/1000;
    rcx.fillStyle='#0D0A1A'; rcx.fillRect(0,0,RW,RH);
    const g=rcx.createRadialGradient(RW/2,RH*0.35,0,RW/2,RH*0.35,RW*0.85);
    g.addColorStop(0,'rgba(124,77,255,0.24)');g.addColorStop(1,'rgba(0,0,0,0)');

    rcx.strokeStyle=`rgba(190,255,41,${(0.35+0.25*Math.sin(elapsed*2.5)).toFixed(2)})`;rcx.lineWidth=6;rcx.stroke();rcx.restore();
    const maxW=RW-140;

    rcx.fillText(crTrunc(rcx,ded.track_name||'',maxW),RW/2,artCY+artR+90);
    rcx.fillStyle='#7A6FA8';rcx.font='500 46px "Plus Jakarta Sans",sans-serif';
    rcx.fillText(crTrunc(rcx,ded.artist_name||'',maxW),RW/2,artCY+artR+160);
    const pillTxt='someone dedicated this to me ♡';
    rcx.font='700 40px "Plus Jakarta Sans",sans-serif';
    const pW2=Math.min(rcx.measureText(pillTxt).width+80,RW-100),pH2=78;
    const pX2=(RW-pW2)/2,pY2=artCY+artR+204;
    rcx.fillStyle='#BEFF29';crRoundRect(rcx,pX2,pY2,pW2,pH2,pH2/2);rcx.fill();
    rcx.fillStyle='#0D0A18';rcx.fillText(pillTxt,RW/2,pY2+pH2/2+14);
    rcx.fillStyle='#BEFF29';rcx.font='700 48px "Plus Jakarta Sans",sans-serif';
    rcx.fillText('dedicate yours ↓',RW/2,RH-230);
    rcx.fillStyle='rgba(122,111,168,0.6)';rcx.font='600 36px "Plus Jakarta Sans",sans-serif';
    rcx.fillText('dedic.to',RW/2,RH-148);
    recRAF2=requestAnimationFrame(renderDedFrame);
  }
  const mimeType=getSupportedMimeType();
  const videoStream=recCvs.captureStream(30);
  let stream=videoStream;
  if(streamDest2){const at=streamDest2.stream.getAudioTracks()[0];if(at)stream=new MediaStream([...videoStream.getTracks(),at]);}
  return new Promise((resolve)=>{
    const chunks=[];
    const rec=new MediaRecorder(stream,mimeType?{mimeType}:{});
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.onstop=()=>{cancelAnimationFrame(recRAF2);resolve(new Blob(chunks,{type:mimeType||'video/webm'}));};
    requestAnimationFrame(renderDedFrame);
    rec.start();
    setTimeout(()=>rec.stop(),clipDur*1000);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   Canvas card helpers
═══════════════════════════════════════════════════════════════════════════ */
function crRoundRect(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

function crTrunc(cx,text,maxW){
  if(cx.measureText(text).width<=maxW)return text;
  let t=text;while(t.length>0&&cx.measureText(t+'…').width>maxW)t=t.slice(0,-1);return t+'…';
}

function crWrap(cx,text,maxW){
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){const test=line?line+' '+w:w;if(cx.measureText(test).width>maxW&&line){lines.push(line);line=w;}else line=test;}
  if(line)lines.push(line);return lines.slice(0,3);
}

  const CPAL=[[124,77,255,.32],[91,143,232,.24],[190,255,41,.12],[196,172,255,.20],[0,200,160,.10],[255,91,173,.08]];
  for(let i=0;i<120;i++){

    cx.fillRect(x,y,px2,px2);

  const glow=cx.createRadialGradient(CARD_W/2,CARD_H*0.38,0,CARD_W/2,CARD_H*0.38,CARD_W*0.85);
  glow.addColorStop(0,'rgba(124,77,255,0.28)');glow.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=glow;cx.fillRect(0,0,CARD_W,CARD_H);

  const img=new Image();img.crossOrigin='anonymous';
  await new Promise(res=>{img.onload=res;img.onerror=res;img.src=ded.artwork_url;});
  const artSize=580,artX=(CARD_W-artSize)/2,artY=300;
  cx.save();crRoundRect(cx,artX,artY,artSize,artSize,60);cx.clip();
  if(img.naturalWidth>0)cx.drawImage(img,artX,artY,artSize,artSize);
  else{cx.fillStyle='#1C1535';cx.fillRect(artX,artY,artSize,artSize);}
  cx.restore();
  const maxW=CARD_W-140;
  let yPos=artY+artSize+80;
  cx.fillStyle='#F5F0FF';cx.font='800 64px "Plus Jakarta Sans",sans-serif';cx.textAlign='center';
  cx.fillText(crTrunc(cx,ded.track_name,maxW),CARD_W/2,yPos);yPos+=72;
  cx.fillStyle='#7A6FA8';cx.font='500 44px "Plus Jakarta Sans",sans-serif';
  cx.fillText(crTrunc(cx,ded.artist_name,maxW),CARD_W/2,yPos);yPos+=76;
  const pillText='someone dedicated this to me anonymously';
  cx.font='700 36px "Plus Jakarta Sans",sans-serif';
  const pW=Math.min(cx.measureText(pillText).width+80,CARD_W-100),pH=72;
  const pX=(CARD_W-pW)/2,pY=yPos;
  cx.fillStyle='#BEFF29';crRoundRect(cx,pX,pY,pW,pH,pH/2);cx.fill();
  cx.fillStyle='#0D0A18';
  if(cx.measureText(pillText).width>CARD_W-180){
    const w2=crWrap(cx,pillText,pW-60);
    let ty=pY+pH/2-((w2.length-1)*44/2)+12;
    for(const l of w2){cx.fillText(l,CARD_W/2,ty);ty+=44;}
  }else{cx.fillText(pillText,CARD_W/2,pY+pH/2+12);}
  yPos+=pH+52;
  if(ded.message){
    cx.fillStyle='#C4ACFF';cx.font='italic 400 40px "Plus Jakarta Sans",sans-serif';
    const lines=crWrap(cx,`"${ded.message}"`,maxW);
    for(const l of lines){cx.fillText(l,CARD_W/2,yPos);yPos+=56;}
  }
  cx.fillStyle='#BEFF29';cx.font='700 48px "Plus Jakarta Sans",sans-serif';
  cx.fillText('get yours ↓',CARD_W/2,CARD_H-220);
  cx.fillStyle='rgba(122,111,168,0.65)';cx.font='600 36px "Plus Jakarta Sans",sans-serif';
  cx.fillText('dedic.to',CARD_W/2,CARD_H-140);
  return c;
}

async function shareCard(canvas, filename) {
  const testFile=new File([],'',{type:'image/png'});
  const canShare=!!(navigator.canShare?.({files:[testFile]}));
  if(canShare){
    await new Promise((res,rej)=>{
      canvas.toBlob(async blob=>{

    });
  }else{
    const link=document.createElement('a');link.download=filename;link.href=canvas.toDataURL('image/png');link.click();
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   Mini preview canvas (invite card preview animation)
═══════════════════════════════════════════════════════════════════════════ */
function startPreviewCanvas(canvasEl) {
  const ctx = canvasEl.getContext('2d');
  const CPX = 10, CGAP = 2, CCELL = CPX + CGAP;
  const CPAL = [
    [124,77,255,.32],[91,143,232,.24],[190,255,41,.12],
    [196,172,255,.20],[0,200,160,.10],[255,91,173,.08]
  ];
  let cPixels = [];
  let animId = null;

  function buildCPx() {
    canvasEl.width = canvasEl.offsetWidth || 270;
    canvasEl.height = canvasEl.offsetHeight || 480;
    const cW = canvasEl.width, cH = canvasEl.height;
    const cols = Math.ceil(cW / CCELL) + 1, rows = Math.ceil(cH / CCELL) + 1;
    cPixels = [];
    const now = performance.now();
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (Math.random() > 0.16) continue;
        const col = CPAL[Math.floor(Math.random() * CPAL.length)];
        cPixels.push({
          x: c * CCELL, y: r * CCELL,
          r: col[0], g: col[1], b: col[2],
          maxOp: col[3],
          period: 900 + Math.random() * 1800,
          phase: Math.random() * Math.PI * 2,
          t0: now - Math.random() * 2700
        });
      }
    }
  }

  function cTick(now) {
    const cW = canvasEl.width, cH = canvasEl.height;
    ctx.clearRect(0, 0, cW, cH);
    for (const px of cPixels) {
      const t = ((now - px.t0) % px.period) / px.period;
      const op = px.maxOp * 0.25 + ((Math.sin(t * Math.PI * 2 + px.phase) + 1) * .5) * px.maxOp * 0.75;
      ctx.fillStyle = `rgba(${px.r},${px.g},${px.b},${op.toFixed(3)})`;
      ctx.fillRect(px.x, px.y, CPX, CPX);
    }
    animId = requestAnimationFrame(cTick);
  }

  buildCPx();
  animId = requestAnimationFrame(cTick);
}

function renderInbox(pageRow, dedications) {

  const shareLink = location.origin + '/for/' + pageRow.share_hash;

  // Header
  document.getElementById('inbox-name-heading').textContent =
    `${pageRow.display_name}’s inbox`;

  const n = dedications.length;
  document.getElementById('inbox-count').textContent =
    n === 0
      ? 'no dedications yet'
      : `${n} anonymous dedication${n !== 1 ? 's' : ''}`;

  // Copy link
  document.getElementById('btn-copy-link').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(shareLink);
      showToast('copied!');
    } catch {
      showToast('could not copy');
    }
  });

  // Share link → platform picker
  document.getElementById('btn-share-link').addEventListener('click', () => {
    openPlatShare(pageRow, cardUrl, displayUrl);
  });

  // Sign out

    if (localStorage.getItem('__dx')) {
      localStorage.removeItem('__dx');

      await sb.auth.signOut();
    }
    location.href = 'for.html';
  });

  const content = document.getElementById('inbox-content');

  /* ── Empty state ── */
  if (dedications.length === 0) {
    const emptyWrap = document.createElement('div');
    emptyWrap.className = 'empty-wrap';

      <div class="empty-card">
        <img src="dedic-me-title.svg" alt="dedic.to" class="empty-title-img">
        <div class="empty-display-name">${escapeHtml(pageRow.display_name)}</div>

          <div class="invite-preview-watermark">dedic.to</div>
        </div>
      </div>

      <button class="share-invite-btn" id="btn-share-invite">share invite card</button>
    `;
    content.appendChild(emptyWrap);

    // Start mini-canvas after render
    requestAnimationFrame(() => {
      const previewCanvas = document.getElementById('preview-canvas');
      if (previewCanvas) startPreviewCanvas(previewCanvas);
    });

    // Share invite card → platform picker
    document.getElementById('btn-share-invite').addEventListener('click', () => {
      openPlatShare(pageRow, cardUrl, displayUrl);
    });

    return;
  }

  /* ── Dedications list ── */
  const list = document.createElement('div');
  list.className = 'ded-list';

  for (const ded of dedications) {
    const card = document.createElement('div');
    card.className = 'ded-card';
    const hasPreview = !!ded.preview_url;
    const safeFilename = `dedic-to-${(ded.track_name || 'song')
      .replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 40)}.png`;

    card.innerHTML = `
      <div class="ded-card-top">
        ${ded.artwork_url
          ? `<img class="ded-art" src="${escapeHtml(ded.artwork_url)}" alt="${escapeHtml(ded.track_name)}" crossorigin="anonymous" loading="lazy">`
          : `<div class="ded-art"></div>`}

          <div class="ded-name">${escapeHtml(ded.track_name || 'Unknown track')}</div>
          <div class="ded-artist">${escapeHtml(ded.artist_name || 'Unknown artist')}</div>

  });

(async function init() {
  try {
    const testRaw = localStorage.getItem('__dx');
    if (testRaw) {
      const testSession = JSON.parse(testRaw);
      const testDeds    = JSON.parse(localStorage.getItem('__dxd') || '[]');
      renderInbox(
        { display_name: testSession.display_name, share_hash: testSession.share_hash, _test: true },
        testDeds,
      );
      return;
    }

    // ── REAL AUTH ────────────────────────────────────────────────
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'for.html'; return; }

    const { data: pageRow, error: pageErr } = await sb.from('receiver_pages')
      .select('*')
      .eq('user_id', session.user.id)
      .single();

    if (pageErr || !pageRow) { window.location.href = 'for.html'; return; }

    const { data: dedications } = await sb.from('anonymous_dedications')
      .select('*')

    document.getElementById('view-inbox').style.display = '';
    document.getElementById('inbox-name-heading').textContent = 'something went wrong';
    document.getElementById('inbox-count').textContent = 'please refresh and try again';

})();

async function _shareToPlatform(platform) {
  closePlatShare();
  try {
    const videoBlob = await _getPshVideoBlob();
    if (videoBlob) showToast('preparing story with music…', 20000);
    const isVideo = !!videoBlob;
    const link = _pshCardUrl || location.origin;

    if (isNativeApp()) {
      let b64 = '';
      if (isVideo) {
        const ar = new FileReader(); ar.readAsDataURL(videoBlob);
        await new Promise(r => ar.onload = r);
        b64 = ar.result.split(',')[1];
      } else {
        const canvas = await _getPshCanvas();
        b64 = canvas.toDataURL('image/png').split(',')[1];
      }
      if (platform === 'insta' && window.CapacitorCustom?.shareToInstagramStories) {
        await window.CapacitorCustom.shareToInstagramStories({
          [isVideo ? 'backgroundVideoBase64' : 'backgroundImageBase64']: b64,
          contentUrl: link, appId: META_APP_ID,
        });
      } else if (platform === 'snap' && window.CapacitorCustom?.shareToSnapchat) {
        await window.CapacitorCustom.shareToSnapchat({
          [isVideo ? 'stickerVideoBase64' : 'stickerImageBase64']: b64,
          attachmentUrl: link, appId: SNAPCHAT_APP_ID,
        });
      } else if (platform === 'tiktok' && window.CapacitorCustom?.shareToTikTok) {
        await window.CapacitorCustom.shareToTikTok({
          [isVideo ? 'videoBase64' : 'imageBase64']: b64,
        });
      } else {
        // Plugin not yet installed — fall through to web share
        if (isVideo) {
          await navigator.share({ files: [new File([videoBlob], 'dedic-story.mp4', { type: videoBlob.type })], title: 'dedic.to' });
        } else {
          const canvas = await _getPshCanvas();
          await shareCard(canvas, 'dedic-to.png');
        }
      }
    } else {
      // Web: system share sheet
      if (isVideo) {
        await navigator.share({ files: [new File([videoBlob], 'dedic-story.mp4', { type: videoBlob.type })], title: 'dedic.to' });
      } else {
        const canvas = await _getPshCanvas();
        await shareCard(canvas, 'dedic-to.png');
      }
    }
  } catch(e) { if (e?.name !== 'AbortError') showToast('could not share'); }
}

document.getElementById('psh-insta').addEventListener('click', () => _shareToPlatform('insta'));
document.getElementById('psh-snap').addEventListener('click',  () => _shareToPlatform('snap'));
document.getElementById('psh-tiktok').addEventListener('click',() => _shareToPlatform('tiktok'));

document.getElementById('psh-copy').addEventListener('click', async () => {
  closePlatShare();
  try { await navigator.clipboard.writeText(_pshCardUrl); showToast('copied!'); }
  catch { showToast('could not copy'); }
});
document.getElementById('psh-more').addEventListener('click', async () => {
  closePlatShare();
  const title = _pshMode === 'ded'
    ? `someone dedicated ${_pshDed?.track_name || 'a song'} to me on dedic.to`
    : `dedicate a song to ${_pshRow?.display_name || 'me'} anonymously`;
  if (navigator.share) {
    try { await navigator.share({ url: _pshCardUrl, title }); } catch { /* cancelled */ }
  } else {
    try { await navigator.clipboard.writeText(_pshCardUrl); showToast('copied!'); }
    catch { showToast('could not copy'); }
  }
});
document.getElementById('psh-cancel').addEventListener('click', closePlatShare);
document.getElementById('psh-scrim').addEventListener('click', closePlatShare);

// ════════════════════════════════════════════════════════════
//  SPLASH
// ════════════════════════════════════════════════════════════
(function() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  // Skip when user navigates between pages in same session
  if (document.referrer && document.referrer.includes(location.hostname) &&
      document.referrer !== location.href) {
    splash.className = 'gone'; return;
  }
  const sc = document.getElementById('splash-canvas');
  const ctx = sc.getContext('2d');
  sc.width = window.innerWidth; sc.height = window.innerHeight;
  const logoEl = document.getElementById('splash-logo');
  const PAL = [[124,77,255],[91,143,232],[190,255,41],[196,172,255],[255,91,173]];
  const S = 5, CELL = 7;

  const imgReady = logoEl.complete
    ? Promise.resolve()
    : new Promise(res => { logoEl.onload = res; logoEl.onerror = res; });

  imgReady.then(() => {
    const rect = logoEl.getBoundingClientRect();
    if (!rect.width) { splash.className = 'gone'; return; }

    // Sample SVG pixels via offscreen canvas
    const off = document.createElement('canvas');
    off.width  = Math.ceil(rect.width);
    off.height = Math.ceil(rect.height);
    const oc = off.getContext('2d');
    try { oc.drawImage(logoEl, 0, 0, off.width, off.height); } catch { splash.className = 'gone'; return; }
    const px = oc.getImageData(0, 0, off.width, off.height).data;

    const tcx = rect.left + rect.width/2, tcy = rect.top + rect.height/2;
    const particles = [];

    for (let y = 0; y < off.height; y += CELL) {
      for (let x = 0; x < off.width; x += CELL) {
        if (px[((y * off.width) + x) * 4 + 3] < 90) continue;
        const wx = rect.left + x;
        const wy = rect.top  + y;
        const a = Math.atan2(wy - tcy, wx - tcx);
        const d = 55 + Math.random() * 180;
        const dist = Math.sqrt((wx-tcx)**2 + (wy-tcy)**2);
        const maxD = Math.sqrt((rect.width/2)**2 + (rect.height/2)**2) || 1;
        const col = PAL[Math.floor(Math.random() * PAL.length)];
        particles.push({
          tx: wx, ty: wy,
          sx: tcx + Math.cos(a)*(dist+d), sy: tcy + Math.sin(a)*(dist+d),
          r: col[0], g: col[1], b: col[2],
          pd: Math.random() * 60,
          fd: (1 - dist/maxD) * 100 + Math.random() * 60,
        });
      }
    }
    if (!particles.length) { splash.className = 'gone'; return; }

    const CONV=450, FOLD_S=490, FOLD=320, TEXT_S=570, FADE_S=820, FADE=320;
    const t0 = performance.now();
    let logoShown = false, done = false;
    function eOut(t){ return 1-(1-t)*(1-t); }

    function tick(now) {
      if (done) return;
      const e = now - t0;
      ctx.clearRect(0, 0, sc.width, sc.height);
      for (const p of particles) {
        const p1 = Math.max(0, Math.min(1, (e - p.pd) / CONV));
        if (e < FOLD_S + p.fd) {
          const t = eOut(p1);
          ctx.globalAlpha = Math.min(1, p1 * 5);
          ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
          ctx.fillRect(p.sx + (p.tx-p.sx)*t, p.sy + (p.ty-p.sy)*t, S, S);
        } else {
          const ft = Math.max(0, Math.min(1, (e - FOLD_S - p.fd) / FOLD));
          if (ft >= 1) continue;
          const h = S * Math.cos(ft * Math.PI/2);
          ctx.globalAlpha = 1 - ft*ft;
          ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
          ctx.fillRect(p.tx, p.ty + (S-h)/2, S, h);
        }
      }
      ctx.globalAlpha = 1;
      if (e >= TEXT_S && !logoShown) {
        logoShown = true;
        logoEl.style.transition = 'opacity .4s cubic-bezier(.22,1,.36,1)';
        logoEl.style.opacity = '1';
      }
      if (e >= FADE_S) {
        splash.style.opacity = String(Math.max(0, 1-(e-FADE_S)/FADE));
        if (e-FADE_S >= FADE) { done=true; splash.className='gone'; return; }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
})();
