<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>your inbox — dedic.to</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --purple:       #7C4DFF;
      --purple-deep:  #5B2FE8;
      --purple-light: #C4ACFF;
      --neon:         #BEFF29;
      --blue:         #5B8FE8;
      --text-primary: #0D0A18;
      --text-sec:     #6B6080;
      --text-muted:   #A89EC0;
      --font:         'Plus Jakarta Sans', sans-serif;
      --r-pill:       50px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; }
    body {
      font-family: var(--font);
      background: #FFFFFF;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
    }

    body.dark {
      --text-primary: #F5F0FF;
      --text-sec:     #9B90BE;
      --text-muted:   #6B6080;
      background: #080612;
      color: var(--text-primary);
    }

    /* ── Glow animation ────────────────────────────────────────────────────── */
    @keyframes glow-cycle {
      0%   { box-shadow: 0 0 0 1.5px #7C4DFF, 0 0 16px 1px rgba(124,77,255,.50); }
      17%  { box-shadow: 0 0 0 1.5px #5B8FE8, 0 0 16px 1px rgba(91,143,232,.50); }
      33%  { box-shadow: 0 0 0 1.5px #BEFF29, 0 0 16px 1px rgba(190,255,41,.40); }
      50%  { box-shadow: 0 0 0 1.5px #FF5BAD, 0 0 16px 1px rgba(255,91,173,.50); }
      67%  { box-shadow: 0 0 0 1.5px #FF8C5A, 0 0 16px 1px rgba(255,140,90,.50); }
      83%  { box-shadow: 0 0 0 1.5px #00C8A0, 0 0 16px 1px rgba(0,200,160,.50); }
      100% { box-shadow: 0 0 0 1.5px #7C4DFF, 0 0 16px 1px rgba(124,77,255,.50); }
    }

    /* ── Loading dots animation ────────────────────────────────────────────── */
    @keyframes ld-pulse {
      0%, 80%, 100% { transform: scale(.55); opacity: .4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── Background canvas ─────────────────────────────────────────────────── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Loading view ──────────────────────────────────────────────────────── */
    #view-loading {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      transition: background .3s;
    }
    body.dark #view-loading { background: #080612; }

    .ld-wrap { display: flex; gap: 10px; align-items: center; }
    .ld {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--purple);
      animation: ld-pulse 1.2s ease-in-out infinite;
    }
    .ld:nth-child(2) { animation-delay: .18s; }
    .ld:nth-child(3) { animation-delay: .36s; }

    /* ── Dark mode toggle ──────────────────────────────────────────────────── */
    #theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 400;
      width: 56px; height: 30px; background: none; border: none; padding: 0;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .tt-track {
      width: 56px; height: 30px; border-radius: 15px;
      background: rgba(210,195,245,.32); border: 1.5px solid rgba(180,160,225,.44);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      position: relative; transition: background .4s, border-color .4s, box-shadow .4s;
    }
    body.dark .tt-track {
      background: rgba(13,10,26,.72); border-color: rgba(190,255,41,.38);
      box-shadow: 0 0 14px rgba(190,255,41,.22), inset 0 0 10px rgba(124,77,255,.14);
    }
    .tt-thumb {
      position: absolute; top: 4px; left: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.18);
      display: flex; align-items: center; justify-content: center; color: #7C4DFF;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .35s, box-shadow .35s, color .35s;
    }
    body.dark .tt-thumb {
      transform: translateX(26px); background: #BEFF29; color: #0D0A18;
      box-shadow: 0 0 12px rgba(190,255,41,.6), 0 2px 6px rgba(0,0,0,.2);
    }
    .tt-thumb svg { width: 11px; height: 11px; flex-shrink: 0; }
    .tt-moon { display: none; } .tt-sun { display: block; }
    body.dark .tt-moon { display: block; } body.dark .tt-sun { display: none; }
    @keyframes tt-click { 0%,100%{transform:scale(1)} 45%{transform:scale(.92)} }
    #theme-toggle:active .tt-track { animation: tt-click .18s ease; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(124,77,255,.92);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: var(--r-pill);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 200;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Page wrap ─────────────────────────────────────────────────────────── */
    .page-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 80px;
      min-height: 100vh;
    }
    .create-nudge { display: block; text-align: center; font-size: 13px; font-weight: 600; color: var(--purple); text-decoration: none; margin-top: 32px; padding: 9px 20px; background: rgba(124,77,255,0.08); border: 1.5px solid rgba(124,77,255,0.22); border-radius: 24px; transition: background .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
    .create-nudge:hover, .create-nudge:active { background: rgba(124,77,255,0.15); border-color: rgba(124,77,255,0.42); }
    body.dark .create-nudge { color: var(--neon); background: rgba(190,255,41,0.07); border-color: rgba(190,255,41,0.22); }
    body.dark .create-nudge:hover, body.dark .create-nudge:active { background: rgba(190,255,41,0.14); border-color: rgba(190,255,41,0.42); }

    /* ── Site logo ─────────────────────────────────────────────────────────── */
    .site-logo {
      width: 110px;
      margin-bottom: 28px;
      display: block;
      object-fit: contain;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .inbox-header {
      width: 100%;
      max-width: 440px;
      margin-bottom: 24px;
    }
    .inbox-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--text-primary) 40%, #7C4DFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    body.dark .inbox-name {
      background: linear-gradient(135deg, #F5F0FF 40%, #C4ACFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .inbox-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .inbox-action-btn {
      padding: 8px 16px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid rgba(180,160,225,.42);
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-primary);
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .inbox-action-btn:hover { background: rgba(237,230,255,.70); border-color: rgba(124,77,255,.30); }
    .inbox-action-btn.danger { color: #FF5BAD; border-color: rgba(255,91,173,.30); }
    .inbox-action-btn.danger:hover { background: rgba(255,91,173,.08); }
    .inbox-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
    }
    body.dark .inbox-action-btn {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.25);
      color: var(--text-primary);
    }
    body.dark .inbox-action-btn:hover {
      background: rgba(40,28,80,.75);
    }
    body.dark .inbox-action-btn.danger {
      color: #FF5BAD;
      border-color: rgba(255,91,173,.30);
    }

    /* ── Dedications list ──────────────────────────────────────────────────── */
    .ded-list {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .invite-footer {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid rgba(180,160,225,.14);
    }
    .invite-footer-text {
      font-size: 12px; color: var(--text-muted); text-align: center;
    }
    body.dark .invite-footer { border-top-color: rgba(196,172,255,.10); }

    /* ── Dedication card ───────────────────────────────────────────────────── */
    .ded-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(180,160,225,.38);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: filter .15s;
    }
    .ded-card:hover { filter: brightness(1.04); }
    .ded-card-top { display: flex; align-items: center; gap: 12px; }
    .ded-art {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(196,172,255,.3);
    }
    .ded-info { flex: 1; min-width: 0; }
    .ded-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ded-artist {
      font-size: 12px;
      color: var(--text-sec);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .ded-anon-pill {
      display: inline-block;
      background: #BEFF29;
      color: #0D0A18;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 50px;
      letter-spacing: .03em;
      align-self: flex-start;
    }
    .ded-message {
      font-size: 13px;
      color: var(--text-sec);
      font-style: italic;
      line-height: 1.5;
    }
    .ded-date { font-size: 11px; color: var(--text-muted); }
    .ded-actions { display: flex; gap: 10px; }
    .ded-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: var(--r-pill);
      border: 1.5px solid rgba(180,160,225,.38);
      background: rgba(255,255,255,.55);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .ded-btn:hover { background: rgba(237,230,255,.70); border-color: rgba(124,77,255,.35); }
    .ded-btn.playing { background: rgba(124,77,255,.12); border-color: rgba(124,77,255,.45); color: var(--purple); }
    .ded-btn:disabled { opacity: .45; cursor: default; }

    body.dark .ded-card {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.18);
    }
    body.dark .ded-btn {
      background: rgba(30,20,55,.70);
      border-color: rgba(180,160,225,.22);
      color: var(--text-primary);
    }
    body.dark .ded-btn:hover {
      background: rgba(60,40,110,.75);
      border-color: rgba(124,77,255,.40);
    }
    body.dark .ded-btn.playing {
      background: rgba(124,77,255,.20);
      border-color: rgba(124,77,255,.55);
      color: #C4ACFF;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    .empty-wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    .empty-card {
      width: 100%;
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(180,160,225,.38);
      border-radius: 24px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    body.dark .empty-card {
      background: rgba(20,14,40,.65);
      border-color: rgba(180,160,225,.18);
    }
    .empty-title-img {
      width: 160px;
      margin-bottom: 4px;
    }
    .empty-display-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--purple-light);
    }
    .empty-heading {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .empty-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Invite card preview ───────────────────────────────────────────────── */
    .invite-preview-wrap {
      position: relative;
      width: 270px;
      height: 480px;
      border-radius: 24px;
      overflow: hidden;
      background: #0D0A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 16px;
      flex-shrink: 0;
      animation: glow-cycle 5s linear infinite;
    }
    #preview-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .invite-preview-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    .invite-preview-title {
      width: 130px;
      margin-bottom: 8px;
    }
    .invite-preview-name {
      font-size: 13px;
      font-weight: 500;
      color: #C4ACFF;
      margin-bottom: 6px;
    }
    .invite-preview-tag {
      font-size: 11px;
      font-weight: 700;
      color: #F5F0FF;
      text-align: center;
      line-height: 1.45;
    }
    .invite-preview-qr-wrap {
      margin-top: auto;
      margin-bottom: 4px;
      padding: 7px;
      background: rgba(190,255,41,0.06);
      border: 1px solid rgba(190,255,41,0.4);
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(190,255,41,0.2), inset 0 0 8px rgba(190,255,41,0.05);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .invite-preview-qr-label {
      font-size: 8px;
      font-weight: 700;
      color: rgba(190,255,41,0.85);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .invite-preview-qr {
      width: 80px; height: 80px;
      border-radius: 6px;
      background: #F0ECFF;
      display: block;
    }
    .invite-preview-url {
      font-size: 9px;
      color: rgba(190,255,41,.80);
      margin-top: 4px;
      word-break: break-all;
      text-align: center;
      line-height: 1.4;
      max-width: 220px;
    }
    .invite-preview-watermark {
      font-size: 9px;
      color: rgba(122,111,168,.55);
      margin-top: 5px;
      font-weight: 600;
    }

    /* ── Share invite button ───────────────────────────────────────────────── */
    .share-invite-btn {
      padding: 12px 28px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid rgba(124,77,255,.45);
      background: rgba(124,77,255,.10);
      color: var(--purple);
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .share-invite-btn:hover {
      background: rgba(124,77,255,.20);
      border-color: rgba(124,77,255,.60);
    }
    .share-invite-btn:disabled {
      opacity: .55;
      cursor: default;
    }
    body.dark .share-invite-btn {
      background: rgba(124,77,255,.18);
      border-color: rgba(196,172,255,.35);
      color: #C4ACFF;
    }
    body.dark .share-invite-btn:hover {
      background: rgba(124,77,255,.30);
    }
  </style>
</head>
<body>

<!-- Background canvas -->
<canvas id="bg"></canvas>

<!-- Loading view -->
<div id="view-loading">
  <div class="ld-wrap">
    <div class="ld"></div>
    <div class="ld"></div>
    <div class="ld"></div>
  </div>
</div>

<!-- Dark mode toggle -->
<button id="theme-toggle" aria-label="Toggle theme">
  <div class="tt-track">
    <div class="tt-thumb">
      <svg class="tt-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="tt-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
    </div>
  </div>
</button>

<!-- Toast -->
<div id="toast"></div>

<!-- Inbox view -->
<div id="view-inbox" style="display:none; width:100%;">
  <div class="page-wrap">

    <img src="dedic-me-title.svg" alt="dedic.to" class="site-logo">

    <div class="inbox-header">
      <div class="inbox-name" id="inbox-name-heading"></div>
      <div class="inbox-actions">
        <button class="inbox-action-btn" id="btn-copy-link">copy my link</button>
        <button class="inbox-action-btn" id="btn-share-link">share my link</button>
        <button class="inbox-action-btn danger" id="btn-sign-out">sign out</button>
      </div>
      <div class="inbox-count" id="inbox-count"></div>
    </div>

    <div id="inbox-content" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

    <a href="create.html" class="create-nudge">dedicate a song to someone →</a>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Supabase
═══════════════════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://lwjolnfoojblpnzeuxzl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3am9sbmZvb2pibHBuemV1eHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODk5MTAsImV4cCI6MjA5ODE2NTkxMH0.RNQr9PFWnUksZ-Xn3REIAo12xMODaHXZfYfhMFiVTog';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ═══════════════════════════════════════════════════════════════════════════
   Theme
═══════════════════════════════════════════════════════════════════════════ */
(function initTheme() {
  const stored = localStorage.getItem('dedic-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (stored === 'dark' || (!stored && prefersDark)) {
    document.body.classList.add('dark');
  }
})();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.body.classList.toggle('dark');
  try { localStorage.setItem('dedic-theme', isDark ? 'dark' : 'light'); } catch {}
});

/* ═══════════════════════════════════════════════════════════════════════════
   Background canvas (exact spec)
═══════════════════════════════════════════════════════════════════════════ */
const bgCanvas=document.getElementById('bg');
const bgCtx=bgCanvas.getContext('2d');
const ωM=(Math.PI*2)/30000,ωM2=ωM*0.77,ωA=ωM*0.625,ωA2=ωM*0.484;
function drawBg(now){
  const dark=document.body.classList.contains('dark');
  bgCtx.fillStyle=dark?'#080612':'#FFFFFF';bgCtx.fillRect(0,0,BW,BH);
  const mx=BW*(0.50+0.44*Math.sin(ωM*now)),my=BH*(0.50+0.38*Math.sin(ωM2*now+1.2));
  const mR=Math.max(BW,BH)*0.60;
  const gM=bgCtx.createRadialGradient(mx,my,0,mx,my,mR);
  if(dark){gM.addColorStop(0,'rgba(124,77,255,0.28)');gM.addColorStop(0.45,'rgba(124,77,255,0.08)');gM.addColorStop(1,'rgba(124,77,255,0)');}
  else{gM.addColorStop(0,'rgba(182,140,255,0.56)');gM.addColorStop(0.40,'rgba(182,140,255,0.18)');gM.addColorStop(1,'rgba(182,140,255,0)');}
  bgCtx.fillStyle=gM;bgCtx.fillRect(0,0,BW,BH);
  const ax=BW*(0.50+0.40*Math.sin(ωA*now+Math.PI)),ay=BH*(0.50+0.34*Math.sin(ωA2*now+2.4));
  const aR=Math.max(BW,BH)*0.44;
  const gA=bgCtx.createRadialGradient(ax,ay,0,ax,ay,aR);
  if(dark){gA.addColorStop(0,'rgba(91,143,232,0.18)');gA.addColorStop(0.45,'rgba(91,143,232,0.05)');gA.addColorStop(1,'rgba(91,143,232,0)');}
  else{gA.addColorStop(0,'rgba(140,170,255,0.34)');gA.addColorStop(0.45,'rgba(140,170,255,0.10)');gA.addColorStop(1,'rgba(140,170,255,0)');}
  bgCtx.fillStyle=gA;bgCtx.fillRect(0,0,BW,BH);
}
function drawGrid(){
  bgCtx.save();bgCtx.strokeStyle='rgba(155,125,210,.050)';bgCtx.lineWidth=1;
  for(let x=.5;x<BW;x+=CELL){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,BH);bgCtx.stroke();}
  for(let y=.5;y<BH;y+=CELL){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(BW,y);bgCtx.stroke();}
  bgCtx.restore();
}
const PX=28,GAP=3,CELL=PX+GAP;
const PAL=[[124,77,255,.20],[91,143,232,.16],[196,172,255,.18],[68,136,255,.13],[190,255,41,.09],[255,91,173,.08],[168,196,255,.10],[255,140,90,.04],[80,200,200,.02]];
const CW_acc=[];let _palSum=0;
for(const c of PAL){_palSum+=c[3];CW_acc.push(_palSum);}
function pickCol(){const r=Math.random()*_palSum;for(let i=0;i<CW_acc.length;i++)if(r<=CW_acc[i])return PAL[i];return PAL[0];}
let pixels=[],BW=0,BH=0;
function bgDens(col,row,cols,rows){
  const nx=col/Math.max(cols-1,1),ny=row/Math.max(rows-1,1);
  const rx=.42*(BH/BW),ry=.40;const dx=(nx-.50)/rx,dy=(ny-.47)/ry;
  const ring=Math.exp(-(Math.abs(Math.sqrt(dx*dx+dy*dy)-1)**2)/(2*.09*.09));
  const mc=Math.min(Math.hypot(nx,ny),Math.hypot(1-nx,ny),Math.hypot(nx,1-ny),Math.hypot(1-nx,1-ny));
  return Math.max(ring*.88,Math.max(0,1-mc/.26)*.94);
}
function buildPx(){
  BW=bgCanvas.width=window.innerWidth;BH=bgCanvas.height=window.innerHeight;
  const cols=Math.ceil(BW/CELL)+1,rows=Math.ceil(BH/CELL)+1;pixels=[];
  const now=performance.now();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const d=bgDens(c,r,cols,rows);if(d<.01||Math.random()>d*.80)continue;
    const col=pickCol();
    pixels.push({ox:c*CELL,oy:r*CELL,x:c*CELL,y:r*CELL,vx:0,vy:0,r:col[0],g:col[1],b:col[2],minOp:.04,maxOp:Math.min(.28+d*.54,.88),period:552+Math.random()*2010,phase:Math.random()*Math.PI*2,t0:now-Math.random()*(552+Math.random()*2010)});
  }
}
let curX=-9999,curY=-9999;
window.addEventListener('mousemove',e=>{curX=e.clientX;curY=e.clientY;});
window.addEventListener('touchmove',e=>{const t=e.touches[0];curX=t.clientX;curY=t.clientY;},{passive:true});
window.addEventListener('touchend',()=>{curX=-9999;curY=-9999;});
const SPRING_K=0.06,DAMPING=0.80,REP_R=110,REP_F=7;
function applySpring(item){
  const ddx=curX-item.x,ddy=curY-item.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);
  let fx=0,fy=0;
  if(dist<REP_R&&dist>0){const str=(1-dist/REP_R)*REP_F;fx=-(ddx/dist)*str;fy=-(ddy/dist)*str;}
  item.vx=(item.vx+(item.ox-item.x)*SPRING_K+fx)*DAMPING;
  item.vy=(item.vy+(item.oy-item.y)*SPRING_K+fy)*DAMPING;
  item.x+=item.vx;item.y+=item.vy;
}
function bgTick(now){
  bgCtx.clearRect(0,0,BW,BH);drawBg(now);drawGrid();
  for(const px of pixels){
    applySpring(px);
    const t=((now-px.t0)%px.period)/px.period;
    const op=px.minOp+((Math.sin(t*Math.PI*2+px.phase)+1)*.5)*(px.maxOp-px.minOp);
    bgCtx.fillStyle=`rgba(${px.r},${px.g},${px.b},${op.toFixed(3)})`;
    bgCtx.fillRect(px.x,px.y,PX,PX);
  }
  requestAnimationFrame(bgTick);
}
let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(buildPx,140);});
buildPx();requestAnimationFrame(bgTick);

/* ═══════════════════════════════════════════════════════════════════════════
   Audio playback
═══════════════════════════════════════════════════════════════════════════ */
const audio=new Audio();let previewTimer=null,activePlayBtn=null;
audio.addEventListener('ended',stopPreview);

function stopPreview(){
  clearTimeout(previewTimer);
  if(activePlayBtn){
    activePlayBtn.classList.remove('playing');
    setPlayIcon(activePlayBtn,false);
    activePlayBtn=null;
  }
}

function togglePlay(btn,url,startSec,dur){
  if(!url)return;
  if(activePlayBtn===btn&&!audio.paused){audio.pause();stopPreview();return;}
  stopPreview();
  activePlayBtn=btn;
  btn.classList.add('playing');
  setPlayIcon(btn,true);
  audio.src=url;
  audio.addEventListener('canplay',()=>{
    audio.currentTime=startSec||0;
    audio.play().catch(stopPreview);
    previewTimer=setTimeout(()=>{audio.pause();stopPreview();},(dur||15)*1000);
  },{once:true});
  audio.load();
}

function setPlayIcon(btn,playing){
  btn.innerHTML=playing
    ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> pause'
    :'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> play clip';
}

function formatDate(iso){
  const d=new Date(iso);const now=new Date();
  const diff=Math.floor((now-d)/86400000);
  if(diff===0)return 'today';
  if(diff===1)return 'yesterday';
  if(diff<7)return `${diff} days ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 1800);
}

/* ═══════════════════════════════════════════════════════════════════════════
   Canvas card helpers
═══════════════════════════════════════════════════════════════════════════ */
function crRoundRect(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

function crTrunc(cx,text,maxW){
  if(cx.measureText(text).width<=maxW)return text;
  let t=text;while(t.length>0&&cx.measureText(t+'…').width>maxW)t=t.slice(0,-1);return t+'…';
}

function crWrap(cx,text,maxW){
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){const test=line?line+' '+w:w;if(cx.measureText(test).width>maxW&&line){lines.push(line);line=w;}else line=test;}
  if(line)lines.push(line);return lines.slice(0,3);
}

async function shareCard(canvas, filename) {

  if(canShare){
    await new Promise((res,rej)=>{

/* ═══════════════════════════════════════════════════════════════════════════
   Mini preview canvas (invite card preview animation)
═══════════════════════════════════════════════════════════════════════════ */
function startPreviewCanvas(canvasEl) {
  const ctx = canvasEl.getContext('2d');
  const CPX = 10, CGAP = 2, CCELL = CPX + CGAP;
  const CPAL = [
    [124,77,255,.32],[91,143,232,.24],[190,255,41,.12],
    [196,172,255,.20],[0,200,160,.10],[255,91,173,.08]
  ];
  let cPixels = [];
  let animId = null;

  function buildCPx() {
    canvasEl.width = canvasEl.offsetWidth || 270;
    canvasEl.height = canvasEl.offsetHeight || 480;
    const cW = canvasEl.width, cH = canvasEl.height;
    const cols = Math.ceil(cW / CCELL) + 1, rows = Math.ceil(cH / CCELL) + 1;
    cPixels = [];
    const now = performance.now();
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (Math.random() > 0.16) continue;
        const col = CPAL[Math.floor(Math.random() * CPAL.length)];
        cPixels.push({
          x: c * CCELL, y: r * CCELL,
          r: col[0], g: col[1], b: col[2],
          maxOp: col[3],
          period: 900 + Math.random() * 1800,
          phase: Math.random() * Math.PI * 2,
          t0: now - Math.random() * 2700
        });
      }
    }
  }

  function cTick(now) {
    const cW = canvasEl.width, cH = canvasEl.height;
    ctx.clearRect(0, 0, cW, cH);
    for (const px of cPixels) {
      const t = ((now - px.t0) % px.period) / px.period;
      const op = px.maxOp * 0.25 + ((Math.sin(t * Math.PI * 2 + px.phase) + 1) * .5) * px.maxOp * 0.75;
      ctx.fillStyle = `rgba(${px.r},${px.g},${px.b},${op.toFixed(3)})`;
      ctx.fillRect(px.x, px.y, CPX, CPX);
    }
    animId = requestAnimationFrame(cTick);
  }

  buildCPx();
  animId = requestAnimationFrame(cTick);
}

/* ═══════════════════════════════════════════════════════════════════════════
   Render inbox
═══════════════════════════════════════════════════════════════════════════ */
function renderInbox(pageRow, dedications) {
  document.getElementById('view-loading').style.display = 'none';
  document.getElementById('view-inbox').style.display = '';

  const shareLink = location.origin + '/for-send.html?h=' + pageRow.share_hash;
  const cardUrl = shareLink;
  const displayUrl = location.hostname + '/for/' + pageRow.share_hash;

  // Header
  document.getElementById('inbox-name-heading').textContent =
    `${pageRow.display_name}’s inbox`;

  const n = dedications.length;
  document.getElementById('inbox-count').textContent =
    n === 0
      ? 'no dedications yet'
      : `${n} anonymous dedication${n !== 1 ? 's' : ''}`;

  // Copy link
  document.getElementById('btn-copy-link').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(shareLink);
      showToast('copied!');
    } catch {
      showToast('could not copy');
    }
  });

  // Share link
  document.getElementById('btn-share-link').addEventListener('click', async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          url: shareLink,
          title: `dedicate a song to ${pageRow.display_name} anonymously`
        });
      } catch { /* cancelled */ }
    } else {
      try {
        await navigator.clipboard.writeText(shareLink);
        showToast('copied!');
      } catch { showToast('could not copy'); }
    }
  });

  // Sign out
  document.getElementById('btn-sign-out').addEventListener('click', async () => {
    if (localStorage.getItem('dedic-test-session')) {
      localStorage.removeItem('dedic-test-session');
      localStorage.removeItem('dedic-test-dedications');
    } else {
      await sb.auth.signOut();
    }
    location.href = 'for.html';
  });

  const content = document.getElementById('inbox-content');

  /* ── Empty state ── */
  if (dedications.length === 0) {
    const emptyWrap = document.createElement('div');
    emptyWrap.className = 'empty-wrap';
    emptyWrap.innerHTML = `
      <div class="empty-card">
        <img src="dedic-me-title.svg" alt="dedic.to" class="empty-title-img">
        <div class="empty-display-name">${escapeHtml(pageRow.display_name)}</div>
        <div class="empty-heading">no dedications yet</div>
        <div class="empty-sub">share your link and someone might send you one</div>
      </div>

      <div class="invite-preview-wrap">
        <canvas id="preview-canvas"></canvas>
        <div class="invite-preview-inner">
          <img src="dedic-me-title.svg" alt="dedic.to" class="invite-preview-title">
          <div class="invite-preview-name">${escapeHtml(pageRow.display_name)}</div>
          <div class="invite-preview-tag">dedicate a song to me<br>anonymously</div>
          <div class="invite-preview-qr-wrap">
            <div class="invite-preview-qr-label">scan to dedicate</div>
            <img id="invite-preview-qr" class="invite-preview-qr" alt="QR code">
          </div>
          <div class="invite-preview-url">${escapeHtml(displayUrl)}</div>
          <div class="invite-preview-watermark">dedic.to</div>
        </div>
      </div>

      <button class="share-invite-btn" id="btn-share-invite">share invite card</button>
    `;
    content.appendChild(emptyWrap);

    // Start mini-canvas + generate QR preview after render
    requestAnimationFrame(async () => {
      const previewCanvas = document.getElementById('preview-canvas');
      if (previewCanvas) startPreviewCanvas(previewCanvas);
      const qrImg = document.getElementById('invite-preview-qr');
      if (qrImg) {
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=86x86&data=${encodeURIComponent(cardUrl)}&bgcolor=F0ECFF&color=0D0A18&margin=1`;
      }
    });

    // Share invite card
    document.getElementById('btn-share-invite').addEventListener('click', async () => {
      const btn = document.getElementById('btn-share-invite');
      btn.textContent = 'generating…';
      btn.disabled = true;
      try {
        const canvas = await generateInviteCard(pageRow.display_name, cardUrl, displayUrl);
        await shareCard(canvas, 'dedic-to-invite.png');
      } catch {
        showToast('could not share');
      }
      btn.textContent = 'share invite card';
      btn.disabled = false;
    });

    return;
  }

  /* ── Dedications list ── */
  const list = document.createElement('div');
  list.className = 'ded-list';

  for (const ded of dedications) {
    const card = document.createElement('div');
    card.className = 'ded-card';
    const hasPreview = !!ded.preview_url;
    const safeFilename = `dedic-to-${(ded.track_name || 'song')
      .replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 40)}.png`;

    card.innerHTML = `
      <div class="ded-card-top">
        ${ded.artwork_url
          ? `<img class="ded-art" src="${escapeHtml(ded.artwork_url)}" alt="${escapeHtml(ded.track_name)}" crossorigin="anonymous" loading="lazy">`
          : `<div class="ded-art"></div>`}
        <div class="ded-info">
          <div class="ded-name">${escapeHtml(ded.track_name || 'Unknown track')}</div>
          <div class="ded-artist">${escapeHtml(ded.artist_name || 'Unknown artist')}</div>
        </div>
      </div>
      <span class="ded-anon-pill">anonymous dedication</span>
      ${ded.message ? `<div class="ded-message">“${escapeHtml(ded.message)}”</div>` : ''}
      <div class="ded-date">${escapeHtml(formatDate(ded.created_at))}</div>
      <div class="ded-actions">
        <button class="ded-btn play-btn"${hasPreview ? '' : ' disabled'}>
          ${hasPreview
            ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> play clip'
            : 'no preview'}
        </button>
        <button class="ded-btn story-btn">share to story &#8594;</button>
      </div>
    `;

    list.appendChild(card);

    // Play clip
    if (hasPreview) {
      const playBtn = card.querySelector('.play-btn');
      playBtn.addEventListener('click', () => {
        togglePlay(playBtn, ded.preview_url, ded.clip_start || 0, ded.clip_duration || 15);
      });
    }

    // Share to story
    const storyBtn = card.querySelector('.story-btn');
    storyBtn.addEventListener('click', async () => {
      storyBtn.textContent = 'generating…';
      storyBtn.disabled = true;
      try {
        const canvas = await generateStoryCard(ded);
        await shareCard(canvas, safeFilename);
      } catch {
        showToast('could not share');
      }
      storyBtn.innerHTML = 'share to story &#8594;';
      storyBtn.disabled = false;
    });
  }

  content.appendChild(list);

  // Invite card reshare — always available even when dedications exist
  const inviteFooter = document.createElement('div');
  inviteFooter.className = 'invite-footer';
  inviteFooter.innerHTML = `
    <div class="invite-footer-text">want more dedications? share your invite card</div>
    <button class="share-invite-btn" id="btn-share-invite">share invite card</button>
  `;
  content.appendChild(inviteFooter);

  document.getElementById('btn-share-invite').addEventListener('click', async () => {
    const btn = document.getElementById('btn-share-invite');
    btn.textContent = 'generating…';
    btn.disabled = true;
    try {
      const canvas = await generateInviteCard(pageRow.display_name, cardUrl);
      await shareCard(canvas, 'dedic-to-invite.png');
    } catch {
      showToast('could not share');
    }
    btn.textContent = 'share invite card';
    btn.disabled = false;
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   Auth & init
═══════════════════════════════════════════════════════════════════════════ */
(async function init() {
  try {
    // ── TEST MODE ────────────────────────────────────────────────
    const testRaw = localStorage.getItem('dedic-test-session');
    if (testRaw) {
      const testSession = JSON.parse(testRaw);
      const testDeds    = JSON.parse(localStorage.getItem('dedic-test-dedications') || '[]');
      renderInbox(
        { display_name: testSession.display_name, share_hash: testSession.share_hash, _test: true },
        testDeds,
      );
      return;
    }

    // ── REAL AUTH ────────────────────────────────────────────────
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'for.html'; return; }

    const { data: pageRow, error: pageErr } = await sb.from('receiver_pages')
      .select('*')
      .eq('user_id', session.user.id)
      .single();

    if (pageErr || !pageRow) { window.location.href = 'for.html'; return; }

    const { data: dedications } = await sb.from('anonymous_dedications')
      .select('*')
      .eq('page_hash', pageRow.share_hash)
      .order('created_at', { ascending: false });

    renderInbox(pageRow, dedications || []);
  } catch (err) {
    console.error('init error', err);
    document.getElementById('view-loading').style.display = 'none';
    document.getElementById('view-inbox').style.display = '';
    document.getElementById('inbox-name-heading').textContent = 'something went wrong';
    document.getElementById('inbox-count').textContent = 'please refresh and try again';
  }
})();
</script>
</body>
</html>
